<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Insights | Glass Edition</title>
    <link rel="stylesheet" href="dashboard.css">
     <!-- Carga la librería primero -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        // Esta función espera a que TODO el HTML esté cargado
        document.addEventListener("DOMContentLoaded", function() {
            lucide.createIcons();
        });
    </script>
</head>
<body>
    <!-- Fondos Dinámicos -->
    <div class="blob-container">
        <div class="blob primary"></div>
        <div class="blob secondary"></div>
    </div>

    <div class="app-container">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="brand">
                <div class="logo-icon"><i data-lucide="cpu"></i></div>
                <span>AI Insights</span>
            </div>
            <nav class="nav-stack">
                <a href="#" class="nav-link active"><i data-lucide="layout-dashboard"></i> Dashboard</a>
                <a href="#" class="nav-link"><i data-lucide="bar-chart-3"></i> Analíticas</a>
                <a href="#" class="nav-link"><i data-lucide="shield-check"></i> Seguridad</a>
            </nav>
            <div class="sidebar-bottom">
                <a href="#" class="nav-link"><i data-lucide="help-circle"></i> Soporte</a>
            </div>
        </aside>

        <!-- MAIN -->
        <main class="main-content">
            <header class="topbar">
                <div class="search-wrapper">
                    <i data-lucide="search"></i>
                    <input type="text" placeholder="Buscar insights...">
                </div>
                
                <div class="header-actions">
                    <!-- BOTÓN DE CAMBIO DE TEMA -->
                    <button id="theme-toggle" class="theme-btn" title="Cambiar Tema">
                        <i data-lucide="moon" id="theme-icon"></i>
                    </button>
                    
                    <div class="user-pill">
                        <div class="avatar">AD</div>
                        <span>Alex Dash</span>
                    </div>
                </div>
            </header>

            <section class="dashboard-grid">
                <div class="glass-card chart-main">
                    <div class="card-header">
                        <h3>Rendimiento del Modelo</h3>
                        <span class="badge">Live</span>
                    </div>
                    <div class="fake-chart"></div>
                </div>

                <div class="glass-card stat-card">
                    <i data-lucide="zap" class="icon-electric"></i>
                    <p class="label">Tokens p/s</p>
                    <h2 class="value">8.4k</h2>
                    <span class="trend">+12%</span>
                </div>

                <div class="glass-card stat-card">
                    <i data-lucide="activity" class="icon-electric"></i>
                    <p class="label">Uptime</p>
                    <h2 class="value">99.9%</h2>
                    <span class="trend">Estable</span>
                </div>

                <div class="glass-card full-width">
                    <div class="card-header">
                        <h3>Logs del Sistema</h3>
                    </div>
                    <div class="log-item">
                        <span class="dot"></span>
                        <p>Nueva optimización de pesos aplicada al modelo v2.4</p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
